<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Divas</title>
     <link rel="icon" type="image/png" href="./images/logo.png">
    <link rel="stylesheet" href="./css/perfil.css">
</head>
<body>
    <header class="header-mobile">
        <div class="logo-mobile">
            <img src="./images/logo.png" alt="Projeto Divas">
            <span>Projeto Divas</span>
        </div>
        <button class="btn-menu-mobile" id="btn-menu-mobile" aria-label="Abrir menu lateral">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div class="dashboard-grid">
        <aside class="sidebar-esq">
            <div class="sidebar-topo">
          <div class="logo">
            <img src="./images/logo.png" alt="Projeto Divas" />
            <span>Projeto Divas</span>
          </div>
        </div>

        <nav class="menu-navegacao">
          <a href="./agenda.html" class="bt-navegacao">
            <img src="./images/icone-12.png" alt="" />
            <span>Início</span>
          </a>

          <a href=" " class="bt-navegacao" onclick="fazerLogout(event)">
            <img src="./images/icone-8.png" alt="" />
            <span>Sair</span>
          </a>
        </nav>

        <a href="#" class="perfil">
          <div class="avatar">
            <img src="./images/icone-9.png" alt="Avatar" />
          </div>
          <!--ESPERANDO BACKEND-->
          <span class="nome-paciente" id="nome-sidebar">Carregando...</span>
        </a>
        </aside>

        <main class="conteudo-principal">
            <h1 class="titulo">Informações da <span>Conta</span></h1>

            <div class="conteiner-info">
                <div class="nome-info">
                    <span>NOME</span>
                    <span>EMAIL</span>
                    <span>SENHA</span>
                </div>

                <div class="informacao">
                    <!--ESPERANDO BACKEND-->
                    <span id="perfil-nome">Carregando...</span>
                    <span id="perfil-email">Carregando...</span>

                    <div>
                     <span id="perfil-senha">••••••••</span>
                    <button type="button" onclick="toggleSenha()" class="btn-ver-senha">
                    <img id="img-senha" src="./images/icone-21.png" alt="Ver senha" width="18" height="18">
                    </button>
                    </div>
                </div>
            </div>
        </main>
    </div>



    <!-- api.js deve ser o primeiro: define Auth, DivasAPI e helpers globais -->
    <script src="./js/api.js"></script>
    <script src="./js/interacoes.js"></script>
    <script src="./js/perfil.js"></script>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <script>
        (function () {
            var btn = document.getElementById('btn-menu-mobile');
            var sidebar = document.querySelector('.sidebar-esq');
            var overlay = document.getElementById('sidebar-overlay');
            btn.addEventListener('click', function () {
                sidebar.classList.toggle('aberta');
                overlay.classList.toggle('ativa');
            });
            overlay.addEventListener('click', function () {
                sidebar.classList.remove('aberta');
                overlay.classList.remove('ativa');
            });
        })();
    </script>
</body>
</html>
