# ============================================================
# PERFIL LOCAL (dev) — banco H2 em memória, sem MySQL necessário
# ============================================================

spring.datasource.url=jdbc:h2:mem:divasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=value
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 disponível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mail fictício (startup OK, falha apenas ao tentar enviar email)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=dev@local.com
spring.mail.password=dev
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT com chave padrão para dev
jwt.secret=projeto-divas-chave-secreta-local-desenvolvimento-precisa-ser-grande

# CORS permite frontend no Live Server e http-server
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,http://localhost:8081
