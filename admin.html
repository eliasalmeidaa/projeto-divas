<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Projeto Divas</title>
    <link rel="icon" type="image/png" href="./images/logo.png">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>
    <header class="header-mobile">
        <div class="logo-mobile">
            <img src="./images/logo.png" alt="Projeto Divas">
            <span>Projeto Divas</span>
        </div>
        <button class="btn-menu-mobile" id="btn-menu-mobile" aria-label="Abrir menu lateral">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div class="dashboard-grid">
        <!-- SIDEBAR ESQUERDA -->
        <aside class="sidebar-esq">
            <div class="sidebar-topo">
                <div class="logo">
                    <img src="./images/logo.png" alt="Projeto Divas" />
                    <span>Projeto Divas</span>
                </div>
            </div>

            <nav class="menu-navegacao">
                <a href="#" class="bt-navegacao active" onclick="ativarBotao(event, this)">
                    <img src="./images/icone-12.png" alt="" />
                    <span>Visão Geral</span>
                </a>

                <a href="#" class="bt-navegacao" onclick="fazerLogout(event)">
                    <img src="./images/icone-8.png" alt="" />
                    <span>Sair</span>
                </a>
            </nav>

            <div class="perfil">
                <div class="avatar">
                    <img src="./images/icone-9.png" alt="Avatar" />
                </div>
                <span class="nome-paciente" id="nome-sidebar">Carregando...</span>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="conteudo-principal">
            <!-- Cabeçalho -->
            <div class="conteudo-superior">
                <h1>
                    <span class="titulo-admin">PAINEL ADMINISTRATIVO</span>
                    <br>
                    Eventos da <span class="titulo-cursivo">Agenda</span>
                </h1>
            </div>

            <!-- Barra de Busca -->
            <div class="busca-container">
                <span class="busca-label">TODOS OS EVENTOS</span>
                <div class="busca-input-wrapper">
                    <img src="./images/icone-23.png" alt="Buscar" class="busca-icone" />
                    <input type="text" id="busca-eventos" placeholder="Buscar por nome ou data" />
                </div>
            </div>

            <!-- TIMELINE DE EVENTOS PUBLICADOS -->
            <div class="timeline" id="timeline-eventos">
                <!-- JS vai injetar os cards de eventos aqui -->
            </div>
        </main>

        <!-- SIDEBAR DIREITA - FORMULÁRIO DE PUBLICAÇÃO -->
        <aside class="sidebar-dir">
            <h3 class="titulo">Novo Evento</h3>

            <div class="calendario">
                <div class="calendario-header">
                    <button class="btn-navegacao" id="btn-anterior">&lt;</button>
                    <h3 id="mes-ano">Abril 2026</h3>
                    <button class="btn-navegacao" id="btn-proximo">&gt;</button>
                </div>

                <div class="dias-semana">
                    <span>DOM</span>
                    <span>SEG</span>
                    <span>TER</span>
                    <span>QUA</span>
                    <span>QUI</span>
                    <span>SEX</span>
                    <span>SÁB</span>
                </div>

                <div class="dias-mes" id="grid-dias"></div>
            </div>

            <!-- FORMULÁRIO DE PUBLICAÇÃO DE EVENTO -->
            <form id="form-publicar-evento" class="form-novo-lembrete">
                <div class="campo-data-hora">
                    <div class="input-wrapper">
                        <label>DATA</label>
                        <input type="text" id="data-input" placeholder="DD/MM/AAAA" readonly required />
                        <img src="./images/icone-10.png" alt="Calendário" class="icone-input" />
                    </div>

                    <div class="input-wrapper">
                        <label>HORÁRIO</label>
                        <input type="text" id="horario-input" placeholder="--:--" maxlength="5" required />
                        <img src="./images/icone-11.png" alt="Relógio" class="icone-input" />
                    </div>
                </div>

                <!-- TIPO DE EVENTO: enviado como tipoEvento para o backend -->
                <label>TIPO DE EVENTO</label>
                <select id="tipo-evento-input" required>
                  <option value="roda-de-conversa">Roda de Conversa</option>
                  <option value="workshop">Workshop</option>
                  <option value="palestra">Palestra</option>
                  <option value="consulta">Consulta</option>
                  <option value="outros">Outros</option>
                </select>

                <!-- LOCAL: preenchido via API (/localidades) pelo admin.js -->
                <label>LOCAL</label>
                <input type="text" id="local-input" placeholder="Digite o endereço">

                <label>TÍTULO DO EVENTO</label>
                <input type="text" id="titulo-input" placeholder="Ex: Roda de Conversa" required />

                <label>FACILITADORA</label>
                <input type="text" id="facilitadora-input" placeholder="Ex: Dra. Ana Luiza" required />

                <label>DESCRIÇÃO</label>
                <textarea id="descricao-input" placeholder="" rows="3" required></textarea>

                <button type="submit" class="btn-salvar">Publicar Evento</button>
            </form>
        </aside>
    </div>

    <!-- SCRIPTS -->
    <!-- api.js deve ser o primeiro: define Auth, DivasAPI e helpers globais -->
    <script src="./js/api.js"></script>
    <script src="./js/calendario.js"></script>
    <script src="./js/admin.js"></script>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <script>
        (function () {
            var btn = document.getElementById('btn-menu-mobile');
            var sidebar = document.querySelector('.sidebar-esq');
            var overlay = document.getElementById('sidebar-overlay');
            btn.addEventListener('click', function () {
                sidebar.classList.toggle('aberta');
                overlay.classList.toggle('ativa');
            });
            overlay.addEventListener('click', function () {
                sidebar.classList.remove('aberta');
                overlay.classList.remove('ativa');
            });
        })();
    </script>
</body>
</html>
