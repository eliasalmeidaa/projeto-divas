services:
  - type: web
    name: projeto-divas-backend
    runtime: java
    buildCommand: cd projeto-divas-backend && ./mvnw clean package -DskipTests
    startCommand: java -jar projeto-divas-backend/target/divas-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
